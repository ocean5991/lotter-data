name: Update Lottery Data

on:
  schedule:
    - cron: '0 9 * * *'  # 每天早上9点自动运行
  workflow_dispatch:  # 支持手动触发
  push:
    branches:
      - master

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Check and update data
        id: update
        run: |
          python3 check_update.py
          echo "has_changes=$(git diff --stat | wc -l)" >> $GITHUB_OUTPUT
        env:
          PYTHONIOENCODING: utf-8

      - name: Generate statistics
        run: python3 analyze.py

      - name: Generate predictions
        run: python3 predict.py

      - name: Commit changes
        if: steps.update.outputs.has_changes > '0'
        run: |
          git config --local user.email "ocean5991@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Auto update: $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"

      - name: Push changes
        if: steps.update.outputs.has_changes > '0'
        run: git push
